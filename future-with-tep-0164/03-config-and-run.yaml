# ⚠️  NON-FUNCTIONAL — proposed TEP-0164 API, not yet implemented.
#
# Cluster-level configuration and example PipelineRuns.
# This is applied once by the platform operator.
---
# Storage backend configuration — applied once per cluster/namespace.
# This replaces all the --plain-http, artifact-store params, and
# registry config scattered across tasks in the PoC.
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-artifact-storage
  namespace: tekton-pipelines
data:
  # Enable external artifact storage
  enabled: "true"

  # Default backend: oci (alternatives: s3, gcs, pvc)
  backend: "oci"

  # Artifacts smaller than this are stored inline in TaskRun status
  inline-threshold: "1024"

  # ── Artifact staging (task-to-task passing) ──────────────────────
  # OCI repository for intermediate artifact storage.
  # This is where artifacts are pushed during a run so downstream
  # tasks can consume them. This is a STAGING area, not where
  # referrers end up (see oci.attachReferrers below).
  oci.repository: "ghcr.io/vdemeester/tekton-experiments/artifacts"

  # Tag pattern — variables: {{namespace}}, {{pipelinerun}}, {{taskrun}}, {{artifact}}
  oci.tagPattern: "{{namespace}}-{{pipelinerun}}-{{artifact}}"

  # ── Referrer attachment (supply chain graph) ───────────────────
  # When enabled, the controller attaches output artifacts as OCI
  # referrers to the buildOutput artifact after the PipelineRun
  # completes.
  #
  # IMPORTANT: OCI referrers MUST live in the same repository as
  # their subject (per OCI Distribution Spec). When the build output
  # is an image (e.g. ghcr.io/org/project:v1), the controller must
  # push referrer manifests into ghcr.io/org/project — NOT into
  # oci.repository. This means:
  #   - The controller needs push access to the build output's repo
  #   - Artifact blobs are cross-mounted or re-uploaded there
  #   - oci.repository is only used for staging, not for referrers
  #
  # For pipelines without a container image build output (e.g. binary
  # tarballs stored in oci.repository itself), referrers are attached
  # within oci.repository since the subject lives there too.
  oci.attachReferrers: "true"

  # Group artifacts per PipelineRun using OCI referrers
  oci.groupByPipelineRun: "true"
---
# PipelineRun for the container image build.
# Compare with build-artifact-referrers/run.yaml — no artifact-store,
# no bundle-registry, no workspaces, no volume claims.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: build-and-test-
spec:
  pipelineRef:
    name: build-and-test
  params:
    - name: git-url
      value: https://github.com/vdemeester/tekton-experiments
    - name: git-revision
      value: main
    - name: image-registry
      value: ghcr.io/vdemeester/tekton-experiments
    - name: version-tag
      value: v1.0.0
  # That's it. No workspaces. No artifact-store. No bundle-registry.
  # The controller reads config-artifact-storage and handles everything.
  #
  # Under the hood, two repos are involved:
  #   ghcr.io/vdemeester/tekton-experiments/artifacts  <- staging (task-to-task)
  #   ghcr.io/vdemeester/tekton-experiments             <- referrers (same repo as image)
  #
  # The controller pushes referrer manifests into the IMAGE's repo
  # (not the staging repo), because OCI referrers must live in the
  # same repository as their subject.
  #
  # After completion, cosign tree shows the full supply chain:
  #   cosign tree ghcr.io/vdemeester/tekton-experiments:v1.0.0
  #   ├── 🔐 Attestations (Tekton Chains SLSA provenance)
  #   ├── 🔐 Signatures (Tekton Chains cosign)
  #   ├── 🔐 SBOMs (ko-generated or syft)
  #   ├── 📦 images-manifest.json (from build-image)
  #   ├── 📦 junit-results.xml (from run-tests)
  #   └── 📦 coverage.out (from run-tests)
---
# PipelineRun for the binary tarball build.
# Exactly the same simplicity — only the pipeline name differs.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: build-binary-
spec:
  pipelineRef:
    name: build-binary-and-test
  params:
    - name: git-url
      value: https://github.com/vdemeester/tekton-experiments
    - name: git-revision
      value: main
    - name: version-tag
      value: v1.0.0
  # After completion:
  #   oras discover ghcr.io/vdemeester/tekton-experiments/artifacts:default-build-binary-xxx-binary
  #   ├── application/vnd.tekton.artifact.junit.v1+xml     (from run-tests)
  #   └── application/vnd.tekton.artifact.coverage.v1      (from run-tests)
  #
  # Pull the binary:
  #   oras pull ghcr.io/vdemeester/tekton-experiments/artifacts:default-build-binary-xxx-binary
---
# Per-namespace override (optional).
# Teams can point to their own registry without touching Pipeline specs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-artifact-storage
  namespace: team-frontend
  labels:
    tekton.dev/config-type: artifact-storage
data:
  backend: "oci"
  oci.repository: "team-frontend-registry.example.com/artifacts"
  oci.credentialsSecret: "team-frontend-registry-creds"
