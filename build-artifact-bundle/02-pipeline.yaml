---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-artifact-bundle
spec:
  description: |
    Builds, tests, and bundles all outputs into a single OCI artifact.

    Uses OCI artifacts (not PVCs) for passing data between tasks:
    - Source code is pushed to OCI after clone, pulled by build and test tasks
    - Each task pushes its outputs as individual OCI artifacts
    - A final task re-bundles everything into one multi-layer OCI artifact

    This is the pattern TEP-0164 aims to automate and make declarative.
  params:
    - name: git-url
      description: Git repository URL
      default: https://github.com/vdemeester/tekton-experiments
    - name: git-revision
      description: Git revision to build
      default: main
    - name: image-registry
      description: Registry for built container images
      default: ttl.sh/tekton-experiments
    - name: artifact-store
      description: OCI repository for intermediate artifacts
      default: ttl.sh/tekton-experiments-artifacts
    - name: bundle-registry
      description: Registry for the final artifact bundle
      default: ttl.sh/tekton-experiments-bundle
    - name: version-tag
      description: Version tag for images and artifact bundle
      default: latest
  results:
    - name: image-ref
      description: Built image reference
      value: $(tasks.build-image.results.image-ref)
    - name: tests-passed
      description: Whether tests passed
      value: $(tasks.run-tests.results.tests-passed)
    - name: coverage
      description: Test coverage percentage
      value: $(tasks.run-tests.results.coverage-pct)
    - name: bundle-ref
      description: OCI artifact bundle reference
      value: $(tasks.bundle.results.bundle-ref)
    - name: bundle-digest
      description: OCI artifact bundle digest
      value: $(tasks.bundle.results.bundle-digest)
  # NOTE: No shared workspace needed! All data flows through OCI artifacts.
  # This is a key advantage — no PVC provisioning, no affinity constraints,
  # tasks can run on different nodes.
  tasks:
    # Step 1: Clone and push source as OCI artifact
    - name: git-clone
      taskRef:
        name: git-clone-oci
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
        - name: artifact-store
          value: $(params.artifact-store)

    # Step 2a: Build container image (parallel with tests)
    - name: build-image
      runAfter: [git-clone]
      taskRef:
        name: build-image
      params:
        - name: source-artifact
          value: $(tasks.git-clone.results.source-artifact)
        - name: image-registry
          value: $(params.image-registry)
        - name: image-tag
          value: $(params.version-tag)
        - name: artifact-store
          value: $(params.artifact-store)

    # Step 2b: Run tests (parallel with build)
    - name: run-tests
      runAfter: [git-clone]
      taskRef:
        name: run-tests
      params:
        - name: source-artifact
          value: $(tasks.git-clone.results.source-artifact)
        - name: packages
          value: "./..."
        - name: artifact-store
          value: $(params.artifact-store)

    # Step 3: Bundle all artifacts into one OCI artifact
    - name: bundle
      runAfter: [build-image, run-tests]
      taskRef:
        name: bundle-artifacts
      params:
        - name: registry
          value: $(params.bundle-registry)
        - name: tag
          value: $(params.version-tag)
        - name: pipelinerun-name
          value: $(context.pipelineRun.name)
        - name: git-sha
          value: $(tasks.git-clone.results.commit)
        - name: git-url
          value: $(params.git-url)
        - name: images-artifact
          value: $(tasks.build-image.results.images-artifact)
        - name: junit-artifact
          value: $(tasks.run-tests.results.junit-artifact)
        - name: coverage-artifact
          value: $(tasks.run-tests.results.coverage-artifact)
