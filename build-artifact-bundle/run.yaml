---
# Example PipelineRun — uses local registry, no PVCs, no auth needed.
#
# Prerequisites:
#   ./hack/setup.sh
#   export KUBECONFIG=/tmp/tekton-experiments.kubeconfig
#   kubectl apply -f build-artifact-bundle/01-tasks.yaml
#   kubectl apply -f build-artifact-bundle/02-pipeline.yaml
#   kubectl create -f build-artifact-bundle/run.yaml
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: build-artifact-bundle-
spec:
  pipelineRef:
    name: build-artifact-bundle
  params:
    - name: git-url
      value: https://github.com/vdemeester/tekton-experiments
    - name: git-revision
      value: main
    # Local registry — no auth, accessible from both host and cluster
    - name: image-registry
      value: tekton-registry:5000/tekton-experiments
    - name: artifact-store
      value: tekton-registry:5000/tekton-experiments/artifacts
    - name: bundle-registry
      value: tekton-registry:5000/tekton-experiments/bundle
    - name: version-tag
      value: latest
  # No workspaces! All data flows through OCI artifacts.
