---
# Reuses shared StepActions: create-oci-artifact, use-oci-artifact
# (already applied from the other experiments)
#
# Task: git-clone-oci — same as other experiments, reused.
#
# New tasks below for the non-container-image flow.
---
# Task: build-binary
# Builds a Go binary tarball and pushes it as the primary OCI artifact.
# This artifact becomes the "subject" for referrers — the thing we ship.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-binary
spec:
  params:
    - name: source-artifact
    - name: binary-registry
      description: "OCI repository for the binary artifact (e.g. registry/myproject/bin)"
    - name: version-tag
      default: latest
    - name: go-version
      default: "1.26"
  results:
    - name: binary-ref
      description: "OCI reference for the binary artifact (subject for referrers)"
  volumes:
    - name: workdir
      emptyDir: {}
  stepTemplate:
    volumeMounts:
      - name: workdir
        mountPath: /var/workdir
  steps:
    - name: use-source
      ref:
        name: use-oci-artifact
      params:
        - name: uri
          value: $(params.source-artifact)
        - name: path
          value: /var/workdir/source
    - name: build
      image: docker.io/library/golang:$(params.go-version)
      env:
        - name: VERSION_TAG
          value: $(params.version-tag)
      script: |
        #!/bin/bash
        set -ex
        cd /var/workdir/source

        # Cross-compile for multiple platforms
        export GOFLAGS="-buildvcs=false"
        mkdir -p /var/workdir/dist

        for GOOS in linux darwin; do
          for GOARCH in amd64 arm64; do
            echo "Building ${GOOS}/${GOARCH}..."
            GOOS=${GOOS} GOARCH=${GOARCH} go build \
              -ldflags "-X github.com/vdemeester/tekton-experiments/pkg/greeting.version=${VERSION_TAG}" \
              -o /var/workdir/dist/tekton-experiments-${GOOS}-${GOARCH} \
              .
          done
        done

        # Create release tarball
        cd /var/workdir/dist
        ls -la
        tar -czf /var/workdir/tekton-experiments-${VERSION_TAG}.tar.gz *

        # Write build metadata
        cat > /var/workdir/build-info.json <<EOF
        {
          "name": "tekton-experiments",
          "version": "${VERSION_TAG}",
          "platforms": ["linux/amd64", "linux/arm64", "darwin/amd64", "darwin/arm64"],
          "files": $(ls -1 | jq -R . | jq -s .)
        }
        EOF

        echo "Built tarball:"
        ls -la /var/workdir/tekton-experiments-${VERSION_TAG}.tar.gz
    - name: push-binary
      image: ghcr.io/oras-project/oras:v1.2.2
      env:
        - name: REGISTRY
          value: $(params.binary-registry)
        - name: VERSION_TAG
          value: $(params.version-tag)
      script: |
        #!/bin/sh
        set -ex
        cd /var/workdir

        FULL_REF="${REGISTRY}:${VERSION_TAG}"

        # Push the tarball as an OCI artifact with build-info as config
        oras push --plain-http "${FULL_REF}" \
          --config build-info.json:application/vnd.tekton.build-info.v1+json \
          --annotation "org.opencontainers.image.title=tekton-experiments" \
          --annotation "org.opencontainers.image.version=${VERSION_TAG}" \
          "tekton-experiments-${VERSION_TAG}.tar.gz:application/gzip"

        # Get the digest
        DIGEST=$(oras manifest fetch --plain-http "${FULL_REF}" --descriptor | \
          sed -n 's/.*"sha256:\([^"]*\)".*/sha256:\1/p' | head -1)

        REF_WITH_DIGEST="${REGISTRY}@${DIGEST}"
        echo -n "${REF_WITH_DIGEST}" > $(results.binary-ref.path)

        echo ""
        echo "Pushed binary artifact: ${FULL_REF}"
        echo "Digest: ${DIGEST}"
        echo "Pull:   oras pull --plain-http ${FULL_REF}"
---
# Task: run-tests (variant without artifact-store push — outputs stay local)
# Tests run and write results to emptyDir. The attach task will read them
# directly. This shows you don't HAVE to push intermediate artifacts if
# you're willing to serialize (attach runs after tests).
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-tests-local
spec:
  params:
    - name: source-artifact
    - name: packages
      default: "./..."
    - name: go-version
      default: "1.26"
    - name: artifact-store
  results:
    - name: tests-passed
    - name: coverage-pct
    - name: junit-artifact
    - name: coverage-artifact
  volumes:
    - name: workdir
      emptyDir: {}
  stepTemplate:
    volumeMounts:
      - name: workdir
        mountPath: /var/workdir
  steps:
    - name: use-source
      ref:
        name: use-oci-artifact
      params:
        - name: uri
          value: $(params.source-artifact)
        - name: path
          value: /var/workdir/source
    - name: test
      image: docker.io/library/golang:$(params.go-version)
      env:
        - name: PACKAGES
          value: $(params.packages)
      script: |
        #!/bin/bash
        set -x
        cd /var/workdir/source
        go install gotest.tools/gotestsum@latest
        PASSED=true
        gotestsum \
          --junitfile /var/workdir/junit-results.xml \
          --format testdox \
          -- \
          -coverprofile=/var/workdir/coverage.out \
          -covermode=atomic \
          -count=1 \
          ${PACKAGES} || PASSED=false
        if [ -f /var/workdir/coverage.out ]; then
          COV=$(go tool cover -func=/var/workdir/coverage.out | tail -1 | awk '{print $3}')
          echo -n "${COV}" > $(results.coverage-pct.path)
        else
          echo -n "0%" > $(results.coverage-pct.path)
        fi
        echo -n "${PASSED}" > $(results.tests-passed.path)
        [ "${PASSED}" = "true" ] || exit 1
    - name: create-junit-artifact
      ref:
        name: create-oci-artifact
      params:
        - name: store
          value: $(params.artifact-store)
        - name: name
          value: junit-results.xml
        - name: path
          value: /var/workdir/junit-results.xml
    - name: create-coverage-artifact
      ref:
        name: create-oci-artifact
      params:
        - name: store
          value: $(params.artifact-store)
        - name: name
          value: coverage.out
        - name: path
          value: /var/workdir/coverage.out
    - name: export-results
      image: docker.io/library/alpine:3.20
      env:
        - name: JUNIT_URI
          value: $(steps.create-junit-artifact.results.uri)
        - name: COVERAGE_URI
          value: $(steps.create-coverage-artifact.results.uri)
      script: |
        #!/bin/sh
        echo -n "${JUNIT_URI}" > $(results.junit-artifact.path)
        echo -n "${COVERAGE_URI}" > $(results.coverage-artifact.path)
---
# Task: attach-artifacts-to-binary
# Attaches test results and coverage as OCI referrers to the binary
# artifact — NOT a container image, just a tarball pushed via oras.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: attach-artifacts-to-binary
spec:
  params:
    - name: binary-ref
      description: "OCI reference for the binary artifact (the subject)"
    - name: junit-artifact
    - name: coverage-artifact
    - name: pipelinerun-name
      default: unknown
    - name: git-sha
      default: unknown
  results:
    - name: referrer-count
  volumes:
    - name: workdir
      emptyDir: {}
  stepTemplate:
    volumeMounts:
      - name: workdir
        mountPath: /var/workdir
  steps:
    - name: fetch-junit
      ref:
        name: use-oci-artifact
      params:
        - name: uri
          value: $(params.junit-artifact)
        - name: path
          value: /var/workdir/junit
    - name: fetch-coverage
      ref:
        name: use-oci-artifact
      params:
        - name: uri
          value: $(params.coverage-artifact)
        - name: path
          value: /var/workdir/coverage
    - name: attach-referrers
      image: ghcr.io/oras-project/oras:v1.2.2
      env:
        - name: BINARY_REF
          value: $(params.binary-ref)
        - name: PIPELINERUN
          value: $(params.pipelinerun-name)
        - name: GIT_SHA
          value: $(params.git-sha)
      script: |
        #!/bin/sh
        set -ex

        # Copy to flat dir (oras needs relative paths)
        mkdir -p /tmp/attach
        cp /var/workdir/junit/junit-results.xml /tmp/attach/
        cp /var/workdir/coverage/coverage.out /tmp/attach/
        cd /tmp/attach

        # Attach JUnit test results as referrer to the BINARY (not a container image!)
        oras attach --plain-http \
          --artifact-type "application/vnd.tekton.artifact.junit.v1+xml" \
          --annotation "dev.tekton.artifact/pipelinerun=${PIPELINERUN}" \
          --annotation "dev.tekton.artifact/git-sha=${GIT_SHA}" \
          --annotation "dev.tekton.artifact/task=run-tests" \
          "${BINARY_REF}" \
          junit-results.xml:application/vnd.tekton.artifact.junit.v1+xml

        # Attach coverage as referrer
        oras attach --plain-http \
          --artifact-type "application/vnd.tekton.artifact.coverage.v1" \
          --annotation "dev.tekton.artifact/pipelinerun=${PIPELINERUN}" \
          --annotation "dev.tekton.artifact/git-sha=${GIT_SHA}" \
          --annotation "dev.tekton.artifact/task=run-tests" \
          "${BINARY_REF}" \
          coverage.out:application/vnd.tekton.artifact.coverage.v1

        echo ""
        echo "=== Referrer tree ==="
        oras discover --plain-http "${BINARY_REF}"

        COUNT=$(oras discover --plain-http --format json "${BINARY_REF}" | grep -c '"artifactType"')
        echo -n "${COUNT}" > $(results.referrer-count.path)

        echo ""
        echo "=== Done ==="
        echo "Attached ${COUNT} referrers to binary artifact: ${BINARY_REF}"
        echo ""
        echo "The subject is a TARBALL, not a container image."
        echo "Same referrers API works for any OCI artifact."
